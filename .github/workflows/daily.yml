name: X Marketing Daily

on:
  schedule:
    # 朝 7:00 JST = 22:00 UTC 前日
    - cron: '57 21 * * *'
    # 昼 12:00 JST = 03:00 UTC
    - cron: '3 3 * * *'
    # 夜 21:00 JST = 12:00 UTC
    - cron: '3 12 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: '実行フェーズ (morning/noon/evening/all)'
        required: true
        default: 'morning'

env:
  NODE_VERSION: '20'

jobs:
  marketing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install xurl
        run: npm install -g @xdevplatform/xurl

      - name: Setup xurl config
        run: |
          mkdir -p ~/.xurl
          cat > ~/.xurl/config.yml << EOF
          apps:
              default:
                  oauth1_token:
                      type: oauth1
                      oauth1:
                          access_token: ${{ secrets.X_OAUTH_ACCESS_TOKEN }}
                          token_secret: ${{ secrets.X_OAUTH_TOKEN_SECRET }}
                          consumer_key: ${{ secrets.X_OAUTH_CONSUMER_KEY }}
                          consumer_secret: ${{ secrets.X_OAUTH_CONSUMER_SECRET }}
                  bearer_token:
                      type: bearer
                      bearer: ${{ secrets.X_BEARER_TOKEN }}
          default_app: default
          EOF

      - name: Determine phase
        id: phase
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "phase=${{ github.event.inputs.phase }}" >> $GITHUB_OUTPUT
          else
            # cron の実行時刻から判定 (UTC)
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 21 ] || [ "$HOUR" -lt 3 ]; then
              echo "phase=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge 3 ] && [ "$HOUR" -lt 10 ]; then
              echo "phase=noon" >> $GITHUB_OUTPUT
            else
              echo "phase=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create log directory
        run: mkdir -p employees/logs

      - name: Run daily schedule
        env:
          PHASE: ${{ steps.phase.outputs.phase }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
        run: bash daily-schedule.sh "$PHASE"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ steps.phase.outputs.phase }}-${{ github.run_number }}
          path: employees/logs/
          retention-days: 30
