name: Impression Analysis

on:
  schedule:
    # 毎日朝6:00 JST = 21:00 UTC 前日
    - cron: '3 21 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install xurl
        run: npm install -g @xdevplatform/xurl

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup xurl config
        run: |
          mkdir -p ~/.xurl
          cat > ~/.xurl/config.yml << EOF
          apps:
              default:
                  oauth1_token:
                      type: oauth1
                      oauth1:
                          access_token: ${{ secrets.X_OAUTH_ACCESS_TOKEN }}
                          token_secret: ${{ secrets.X_OAUTH_TOKEN_SECRET }}
                          consumer_key: ${{ secrets.X_OAUTH_CONSUMER_KEY }}
                          consumer_secret: ${{ secrets.X_OAUTH_CONSUMER_SECRET }}
                  bearer_token:
                      type: bearer
                      bearer: ${{ secrets.X_BEARER_TOKEN }}
          default_app: default
          EOF

      - name: Create directories
        run: mkdir -p employees/logs/metrics employees/logs/insights employees/logs/pending

      - name: Run impression analyzer
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: glm-5.1
          LLM_API_URL: https://api.z.ai/api/coding/paas/v4/chat/completions
          GITHUB_REPO: ${{ github.repository }}
        run: bash employees/impression-analyzer/run.sh

      - name: Commit insights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add employees/logs/metrics/ employees/logs/insights/ || true
          git commit -m "Update insights $(date +%Y-%m-%d)" || true
          git push || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-${{ github.run_number }}
          path: |
            employees/logs/metrics/
            employees/logs/insights/
          retention-days: 30
