name: Approve Draft

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'アクション (approve/edit)'
        required: true
        default: 'approve'
      draft_id:
        description: '下書きID (pending/内のファイル名)'
        required: true
      new_content:
        description: '修正内容（editの場合のみ）'
        required: false
        default: ''

env:
  NODE_VERSION: '20'

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install xurl
        run: npm install -g @xdevplatform/xurl

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup xurl config
        run: |
          mkdir -p ~/.xurl
          cat > ~/.xurl/config.yml << EOF
          apps:
              default:
                  oauth1_token:
                      type: oauth1
                      oauth1:
                          access_token: ${{ secrets.X_OAUTH_ACCESS_TOKEN }}
                          token_secret: ${{ secrets.X_OAUTH_TOKEN_SECRET }}
                          consumer_key: ${{ secrets.X_OAUTH_CONSUMER_KEY }}
                          consumer_secret: ${{ secrets.X_OAUTH_CONSUMER_SECRET }}
                  bearer_token:
                      type: bearer
                      bearer: ${{ secrets.X_BEARER_TOKEN }}
          default_app: default
          EOF

      - name: Create directories
        run: mkdir -p employees/logs/pending

      - name: Restore pending file
        env:
          DRAFT_ID: ${{ github.event.inputs.draft_id }}
        run: |
          # pendingファイルをgitから復元（あれば）
          if [ -f "employees/logs/pending/${DRAFT_ID}.json" ]; then
            echo "Found pending file: ${DRAFT_ID}"
            cat "employees/logs/pending/${DRAFT_ID}.json"
          else
            echo "Warning: pending file not found locally"
          fi

      - name: Execute approval
        env:
          DRAFT_ID: ${{ github.event.inputs.draft_id }}
          ACTION: ${{ github.event.inputs.action }}
          NEW_CONTENT: ${{ github.event.inputs.new_content }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: glm-5.1
          LLM_API_URL: https://api.z.ai/api/coding/paas/v4/chat/completions
          GITHUB_REPO: ${{ github.repository }}
        run: |
          source lib/utils.sh

          PENDING_FILE="employees/logs/pending/${DRAFT_ID}.json"
          if [ ! -f "$PENDING_FILE" ]; then
            echo "Error: Draft not found: $DRAFT_ID"
            notify_result "system" "承認エラー" "下書きが見つかりません: ${DRAFT_ID}" "false"
            exit 1
          fi

          TYPE=$(jq -r '.type' "$PENDING_FILE")

          if [ "$ACTION" = "edit" ] && [ -n "$NEW_CONTENT" ]; then
            echo "Editing and approving: $DRAFT_ID"
            approve_pending "$DRAFT_ID" "$NEW_CONTENT"
            notify_result "$TYPE" "編集して承認" "ID: ${DRAFT_ID}\n内容: ${NEW_CONTENT:0:200}"
          else
            echo "Approving: $DRAFT_ID"
            approve_pending "$DRAFT_ID"
            CONTENT=$(jq -r '.data | (.post_text // .reply_text // .quote_text // "N/A")' "$PENDING_FILE")
            notify_result "$TYPE" "承認済み" "ID: ${DRAFT_ID}\n内容: ${CONTENT:0:200}"
          fi
