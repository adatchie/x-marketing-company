name: approve

on:
  workflow_dispatch:
    inputs:
      action:
        description: approve or revise or regenerate
        required: true
        default: approve
      draft_id:
        description: draft id
        required: true
      feedback:
        description: feedback (optional)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "action=${{ github.event.inputs.action }} draft_id=${{ github.event.inputs.draft_id }}"
