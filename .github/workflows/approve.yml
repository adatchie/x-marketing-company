name: approve

on:
  workflow_dispatch:
    inputs:
      action:
        description: "approve or revise or regenerate"
        required: true
        default: "approve"
      draft_id:
        description: "draft id"
        required: true
      feedback:
        description: "revision instructions or regenerate hints (optional)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install xurl
        run: npm install -g @xdevplatform/xurl

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup xurl config
        run: |
          mkdir -p ~/.xurl
          cat > ~/.xurl/config.yml << EOF
          apps:
              default:
                  oauth1_token:
                      type: oauth1
                      oauth1:
                          access_token: ${{ secrets.X_OAUTH_ACCESS_TOKEN }}
                          token_secret: ${{ secrets.X_OAUTH_TOKEN_SECRET }}
                          consumer_key: ${{ secrets.X_OAUTH_CONSUMER_KEY }}
                          consumer_secret: ${{ secrets.X_OAUTH_CONSUMER_SECRET }}
                  bearer_token:
                      type: bearer
                      bearer: ${{ secrets.X_BEARER_TOKEN }}
          default_app: default
          EOF

      - name: Create directories
        run: mkdir -p employees/logs/pending

      - name: Process action
        env:
          DRAFT_ID: ${{ github.event.inputs.draft_id }}
          ACTION: ${{ github.event.inputs.action }}
          FEEDBACK: ${{ github.event.inputs.feedback }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: glm-5.1
          LLM_API_URL: https://api.z.ai/api/coding/paas/v4/chat/completions
          GITHUB_REPO: ${{ github.repository }}
        run: bash scripts/approve-action.sh "$DRAFT_ID" "$ACTION" "$FEEDBACK"
